name: Daily Research Trigger

on:
  schedule:
    # Every day at 15:00 UTC = 23:00 Taiwan time (UTC+8)
    # Runs after daily boba (09:00 TW), during off-peak hours
    - cron: '0 15 * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord mention to trigger daily research
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret not configured"
            exit 1
          fi

          # Mention the bot in the research channel
          # Bot ID: 1490889625374429306 (AgentBroker)
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"content":"<@1490889625374429306> 跑研究","username":"Research Scheduler"}'
          echo "Sent daily research trigger"
